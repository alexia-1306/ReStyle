{% extends "base.html" %}

{% block content %}
    <h1>Anunturi</h1>

    {% for ad in ads %}
    <div>
    <h2>{{ ad.name }}</h2>
    <p>{{ ad.price }}</p>
    <p>{{ ad.city }}</p>
    {% if ad.image %}
    <img src="{{ add.image.url }}" alt="{{ ad.name }}" width="200">
    {% endif %}
    </div>
    {% empty %}
    <p>Nu exista anunturi.</p>
    {% endfor %}
{% endblock %}
