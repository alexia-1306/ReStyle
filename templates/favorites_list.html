{% extends "base.html" %}

{% block content %}

<style>
    .body{
        background: linear-gradient(135deg, #eedc95, rgb(238, 182, 192, 0.4));
    }
    .ads-title {
        text-align: center;
        font-size: 36px;
        font-weight: 800;
        margin: 30px 0;
        color: #444;
    }

    .ads-container {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 25px;
        padding: 20px;
    }

    .card {
        height: 100%;
        display: flex;
        flex-direction: column;
        border: 2px solid #ffe8a3;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
        transition: 0.2s ease;
    }

    .card:hover {
        transform: translateY(-4px);
        border-color: #ffc8dd;
    }

    .card-img-top {
        width: 100%;
        height: 220px;
        object-fit: cover;
    }

    .card-body {
        display: flex;
        flex-direction: column;
        flex: 1;
        background: linear-gradient(135deg, #eedc95, rgb(238, 182, 192));
        
    }

    .card-title {
        font-size: 22px;
        font-weight: 700;
        color: #333;
    }

    .card-text {
        color: #666;
        margin-bottom: 8px;
    }

    .card-price {
        display: inline-block;
        background: #fff1b8;
        color: #444;
        padding: 6px 12px;
        border-radius: 12px;
        font-weight: 700;
        margin-bottom: 12px;
    }

    .buttons {
        display: flex;
        gap: 10px;
        margin-top: auto;
    }

    .btn-details {
        background: #ffd6e7;
        color: #444;
        border: none;
        border-radius: 10px;
        padding: 10px 14px;
        text-decoration: none;
        font-weight: 600;
    }

    .btn-details:hover {
        background: #ffc2db;
    }

    .btn-favorite {
        background: #fff1b8;
        color: #444;
        border: none;
        border-radius: 10px;
        padding: 10px 14px;
        text-decoration: none;
        font-weight: 600;
    }

    .btn-favorite:hover {
        background: #ffe48c;
    }

    @media (max-width: 768px) {
        .ads-container {
            grid-template-columns: 1fr;
        }
    }
</style>
<div class="body">
<div class="ads-title">
<h1>Anunturi</h1>
</div>
<div class="ads-container">
    {% for fav in favs %}
    <div class="card" style="width: 18rem;">

        {% if fav.ad.image %}
        <img src="{{ fav.ad.image.url }}" class="card-img-top" alt={{ fav.ad.image }}>
        {% endif %}
        <div class="card-body">
            <h5 class="card-title">{{ fav.ad.name }}</h5>
            <p class="card-price">{{ fav.ad.price }} RON</p>
            <p class="card-text">{{ fav.ad.city}}</p>
            {% for fav in favs %}
            {% if fav.ad %}
            <a href="{% url 'ad_detail' fav.ad.id %}" class="btn-details">Vezi anuntul</a>
            {% endif %}
            {% endfor %}
        </div>
    </div>
    {% endfor %}
</div>
</div>
{% endblock %}
